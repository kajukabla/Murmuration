<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>3D Murmuration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 12px; left: 16px;
    color: #aac; font: 14px/1.4 monospace;
    pointer-events: none; text-shadow: 0 1px 3px #000;
  }
  #error {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #f88; font: 18px/1.6 system-ui; text-align: center; padding: 2em;
  }

  /* --- Settings panel --- */
  #panel {
    position: fixed; top: 12px; right: 16px; width: 280px;
    z-index: 10; user-select: none;
  }
  #panel-toggle {
    display: block; width: 100%; padding: 8px 14px;
    background: rgba(20,20,40,0.85); color: #aac; border: 1px solid rgba(100,100,160,0.3);
    border-radius: 6px; font: 13px/1 system-ui; cursor: pointer; text-align: left;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  #panel-toggle:hover { background: rgba(30,30,60,0.9); }
  #panel-toggle::after { content: ' \u25BC'; float: right; font-size: 10px; }
  #panel.open #panel-toggle::after { content: ' \u25B2'; }
  #panel-body {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
    background: rgba(10,10,25,0.88); border: 1px solid rgba(100,100,160,0.25);
    border-top: none; border-radius: 0 0 6px 6px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  #panel.open #panel-body { max-height: 700px; }
  #panel-inner { padding: 10px 14px 14px; }

  .param-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  }
  .param-row label {
    flex: 0 0 90px; color: #889; font-size: 11px; text-align: right;
  }
  .param-row input[type=range] {
    flex: 1; height: 4px; accent-color: #668cff;
  }
  .param-row .val {
    flex: 0 0 42px; color: #bbd; font: 11px monospace; text-align: right;
  }

  .preset-row {
    display: flex; gap: 6px; margin-bottom: 10px; align-items: center;
  }
  .preset-row select {
    flex: 1; padding: 4px 6px; font-size: 12px;
    background: rgba(30,30,60,0.9); color: #bbd; border: 1px solid rgba(100,100,160,0.3);
    border-radius: 4px;
  }
  .preset-row button {
    padding: 4px 8px; font-size: 11px; cursor: pointer;
    background: rgba(40,40,80,0.8); color: #aac; border: 1px solid rgba(100,100,160,0.3);
    border-radius: 4px;
  }
  .preset-row button:hover { background: rgba(60,60,100,0.9); }
  .section-label {
    color: #667; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    margin: 8px 0 4px; padding-bottom: 2px; border-bottom: 1px solid rgba(100,100,160,0.15);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>

<div id="panel">
  <button id="panel-toggle">Settings</button>
  <div id="panel-body"><div id="panel-inner">
    <div class="section-label">Presets</div>
    <div class="preset-row">
      <select id="preset-select"></select>
      <button id="preset-save" title="Save current as new preset">Save</button>
      <button id="preset-del" title="Delete selected user preset">Del</button>
    </div>
    <div class="section-label">Visuals</div>
    <div class="param-row">
      <label>Gradient</label>
      <select id="gradient-select" style="flex:1; padding:3px 6px; font-size:12px; background:rgba(30,30,60,0.9); color:#bbd; border:1px solid rgba(100,100,160,0.3); border-radius:4px;">
        <option value="0">Viridis</option>
        <option value="1">Inferno</option>
        <option value="2">Magma</option>
        <option value="3">Plasma</option>
        <option value="4">Turbo</option>
        <option value="5">Cividis</option>
        <option value="6">Coolwarm</option>
        <option value="7">Spectral</option>
        <option value="8">Hot</option>
        <option value="9">Ocean</option>
      </select>
    </div>
    <div class="param-row">
      <label>Color Source</label>
      <select id="color-source-select" style="flex:1; padding:3px 6px; font-size:12px; background:rgba(30,30,60,0.9); color:#bbd; border:1px solid rgba(100,100,160,0.3); border-radius:4px;">
        <option value="0">Velocity Direction</option>
        <option value="1">Speed</option>
        <option value="2">Direction Change</option>
        <option value="3">Neighbor Count</option>
        <option value="4">Altitude</option>
        <option value="5">Distance from Center</option>
        <option value="6">Flock Alignment</option>
        <option value="7">Separation Pressure</option>
        <option value="8">Local Density</option>
        <option value="9">Boid ID</option>
      </select>
    </div>
    <div class="param-row">
      <label>Gain</label>
      <input type="range" id="gain-slider" min="0.0" max="1.0" step="0.01" value="0.5" style="flex:1; height:4px; accent-color:#668cff;">
      <span class="val" id="gain-val">0.50</span>
    </div>
    <div class="param-row">
      <label>Auto-Range</label>
      <label style="flex:1; color:#aab; font-size:12px; cursor:pointer;">
        <input type="checkbox" id="auto-range-cb" style="accent-color:#668cff; margin-right:4px;">
        Normalize to data range
      </label>
    </div>
    <div class="section-label">Physics</div>
    <div id="sliders"></div>
  </div></div>
</div>

<script type="module">
import { createSimulation } from './simulation.js';
import { createRenderer }   from './renderer.js';

// Benchmark mode: ?boids=N runs a measured benchmark
const urlParams = new URLSearchParams(location.search);
const benchmarkBoids = urlParams.get('boids') ? parseInt(urlParams.get('boids')) : null;

let NUM_BOIDS = benchmarkBoids || 5000;
if (!benchmarkBoids) {
  try {
    const tsv = await (await fetch('results.tsv')).text();
    const lines = tsv.trim().split('\n').slice(1);
    const kept = lines.filter(l => l.includes('kept'));
    if (kept.length) {
      const best = parseInt(kept[kept.length - 1].split('\t')[1]);
      if (best > 0) NUM_BOIDS = Math.min(best, 500000);
    }
  } catch {}
}
const WORLD_SIZE = 100;

// ============================================================
// Built-in presets
// ============================================================
const BUILTIN_PRESETS = {
  'Murmuration': {
    simSpeed: 1.0, sizeRandomness: 0.0, dragFactor: 0.3,
    visualRange: 5.0, separationDist: 1.5, alignFactor: 0.08,
    cohesionFactor: 0.006, separationFactor: 0.5,
    maxSpeed: 8.0, minSpeed: 2.5, turnFactor: 0.5, smoothing: 0.04,
  },
  'Boids Classic': {
    simSpeed: 1.0, sizeRandomness: 0.0, dragFactor: 0.3,
    visualRange: 3.0, separationDist: 1.2, alignFactor: 0.04,
    cohesionFactor: 0.003, separationFactor: 0.4,
    maxSpeed: 6.0, minSpeed: 1.5, turnFactor: 0.35, smoothing: 0.08,
  },
  'Swarm': {
    simSpeed: 1.0, sizeRandomness: 0.3, dragFactor: 0.5,
    visualRange: 4.0, separationDist: 0.8, alignFactor: 0.01,
    cohesionFactor: 0.02, separationFactor: 0.3,
    maxSpeed: 5.0, minSpeed: 0.5, turnFactor: 0.4, smoothing: 0.15,
  },
  'Predator Evasion': {
    simSpeed: 1.0, sizeRandomness: 0.0, dragFactor: 0.3,
    visualRange: 6.0, separationDist: 3.0, alignFactor: 0.03,
    cohesionFactor: 0.008, separationFactor: 1.5,
    maxSpeed: 12.0, minSpeed: 3.0, turnFactor: 0.6, smoothing: 0.06,
  },
  'Lazy Drift': {
    simSpeed: 0.7, sizeRandomness: 0.5, dragFactor: 0.6,
    visualRange: 7.0, separationDist: 2.0, alignFactor: 0.06,
    cohesionFactor: 0.002, separationFactor: 0.2,
    maxSpeed: 3.0, minSpeed: 0.3, turnFactor: 0.15, smoothing: 0.02,
  },
};

// Slider definitions: [key, label, min, max, step]
const SLIDER_DEFS = [
  ['simSpeed',        'Sim Speed',     0.1,   3.0,  0.1],
  ['sizeRandomness',  'Size Random',   0.0,   1.0,  0.05],
  ['dragFactor',      'Size Drag',     0.0,   1.0,  0.05],
  ['visualRange',     'Visual Range',  1.0,  10.0,  0.1],
  ['separationDist',  'Sep. Dist',     0.3,   5.0,  0.1],
  ['alignFactor',     'Alignment',     0.001, 0.2,  0.001],
  ['cohesionFactor',  'Cohesion',      0.0005,0.05, 0.0005],
  ['separationFactor','Separation',    0.05,  2.0,  0.01],
  ['maxSpeed',        'Max Speed',     1.0,  15.0,  0.5],
  ['minSpeed',        'Min Speed',     0.1,   5.0,  0.1],
  ['turnFactor',      'Turn Factor',   0.05,  1.0,  0.05],
  ['smoothing',       'Turn Rate',     0.01,  0.3,  0.005],
];

// ============================================================
// WebGPU init
// ============================================================
if (!navigator.gpu) { showError('WebGPU not supported. Use Chrome 113+ or Edge 113+.'); throw ''; }
const adapter = await navigator.gpu.requestAdapter();
if (!adapter) { showError('No WebGPU adapter found.'); throw ''; }
const device = await adapter.requestDevice();

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('webgpu');

function resize() {
  const dpr = devicePixelRatio;
  canvas.width  = Math.floor(innerWidth * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
}
resize();

const simulation = await createSimulation(device, { numBoids: NUM_BOIDS, worldSize: WORLD_SIZE });
const renderer   = await createRenderer(device, ctx, simulation);
addEventListener('resize', () => { resize(); renderer.resize(); });

// ============================================================
// Current params state
// ============================================================
let currentParams = { ...BUILTIN_PRESETS['Murmuration'] };
simulation.setParams(currentParams);

// ============================================================
// UI: Sliders
// ============================================================
const sliderEls = {};
const slidersDiv = document.getElementById('sliders');

for (const [key, label, min, max, step] of SLIDER_DEFS) {
  const row = document.createElement('div');
  row.className = 'param-row';

  const lbl = document.createElement('label');
  lbl.textContent = label;

  const input = document.createElement('input');
  input.type = 'range';
  input.min = min; input.max = max; input.step = step;
  input.value = currentParams[key];

  const val = document.createElement('span');
  val.className = 'val';
  val.textContent = fmtVal(currentParams[key], step);

  input.addEventListener('input', () => {
    const v = parseFloat(input.value);
    currentParams[key] = v;
    val.textContent = fmtVal(v, step);
    simulation.setParams(currentParams);
  });

  row.append(lbl, input, val);
  slidersDiv.appendChild(row);
  sliderEls[key] = { input, val, step };
}

function fmtVal(v, step) {
  const dec = step < 0.01 ? 4 : step < 0.1 ? 3 : step < 1 ? 2 : 1;
  return v.toFixed(dec);
}

function syncSliders() {
  for (const [key] of SLIDER_DEFS) {
    const el = sliderEls[key];
    el.input.value = currentParams[key];
    el.val.textContent = fmtVal(currentParams[key], el.step);
  }
}

// ============================================================
// UI: Presets
// ============================================================
const LS_KEY = 'murmuration-user-presets';
const presetSelect = document.getElementById('preset-select');

function loadUserPresets() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveUserPresets(obj) {
  localStorage.setItem(LS_KEY, JSON.stringify(obj));
}

function populatePresetDropdown() {
  presetSelect.innerHTML = '';
  // Built-in
  for (const name of Object.keys(BUILTIN_PRESETS)) {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    presetSelect.appendChild(opt);
  }
  // User
  const userPresets = loadUserPresets();
  const userNames = Object.keys(userPresets);
  if (userNames.length) {
    const sep = document.createElement('option');
    sep.disabled = true; sep.textContent = '--- User Presets ---';
    presetSelect.appendChild(sep);
    for (const name of userNames) {
      const opt = document.createElement('option');
      opt.value = `user:${name}`; opt.textContent = name;
      presetSelect.appendChild(opt);
    }
  }
}

function applyPreset(name) {
  let params;
  if (name.startsWith('user:')) {
    params = loadUserPresets()[name.slice(5)];
  } else {
    params = BUILTIN_PRESETS[name];
  }
  if (!params) return;
  currentParams = { ...params };
  simulation.setParams(currentParams);
  syncSliders();
}

presetSelect.addEventListener('change', () => applyPreset(presetSelect.value));

document.getElementById('preset-save').addEventListener('click', () => {
  const name = prompt('Preset name:');
  if (!name || !name.trim()) return;
  const userPresets = loadUserPresets();
  userPresets[name.trim()] = { ...currentParams };
  saveUserPresets(userPresets);
  populatePresetDropdown();
  presetSelect.value = `user:${name.trim()}`;
});

document.getElementById('preset-del').addEventListener('click', () => {
  const sel = presetSelect.value;
  if (!sel.startsWith('user:')) return; // can't delete built-in
  const name = sel.slice(5);
  const userPresets = loadUserPresets();
  delete userPresets[name];
  saveUserPresets(userPresets);
  populatePresetDropdown();
  presetSelect.value = 'Swarm';
  applyPreset('Murmuration');
});

populatePresetDropdown();
presetSelect.value = 'Swarm';

// Gain slider
const gainSlider = document.getElementById('gain-slider');
const gainVal = document.getElementById('gain-val');
currentParams.gain = 0.5;
gainSlider.addEventListener('input', () => {
  currentParams.gain = parseFloat(gainSlider.value);
  gainVal.textContent = currentParams.gain.toFixed(2);
});

// Auto-range checkbox
const autoRangeCb = document.getElementById('auto-range-cb');
autoRangeCb.addEventListener('change', () => {
  simulation.autoRange = autoRangeCb.checked;
});

// Gradient + Color Source dropdowns
const gradientSelect = document.getElementById('gradient-select');
const colorSourceSelect = document.getElementById('color-source-select');
currentParams.gradientId = 0;
currentParams.colorSource = 0;

gradientSelect.addEventListener('change', () => {
  currentParams.gradientId = parseInt(gradientSelect.value);
  simulation.setParams(currentParams);
});
colorSourceSelect.addEventListener('change', () => {
  currentParams.colorSource = parseInt(colorSourceSelect.value);
  simulation.setParams(currentParams);
});

// Panel toggle
const panel = document.getElementById('panel');
document.getElementById('panel-toggle').addEventListener('click', () => {
  panel.classList.toggle('open');
});

// ============================================================
// Orbit camera
// ============================================================
let azimuth   = 0.5;
let elevation = 0.35;
let distance  = 140;

canvas.addEventListener('pointerdown', (e) => {
  canvas.setPointerCapture(e.pointerId);
  let lastX = e.clientX, lastY = e.clientY;
  const move = (ev) => {
    azimuth   -= (ev.clientX - lastX) * 0.005;
    elevation  = Math.max(-1.5, Math.min(1.5, elevation + (ev.clientY - lastY) * 0.005));
    lastX = ev.clientX; lastY = ev.clientY;
  };
  const up = () => { canvas.removeEventListener('pointermove', move); canvas.removeEventListener('pointerup', up); };
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', up);
});
canvas.addEventListener('wheel', (e) => {
  distance = Math.max(20, Math.min(400, distance * (1 + e.deltaY * 0.001)));
  e.preventDefault();
}, { passive: false });

// ============================================================
// Matrix helpers
// ============================================================
function perspective(fov, aspect, near, far) {
  const f = 1 / Math.tan(fov / 2);
  const nf = 1 / (near - far);
  return new Float32Array([
    f / aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far + near) * nf, -1,
    0, 0, 2 * far * near * nf, 0,
  ]);
}

function lookAt(eye, target, up) {
  const zx = eye[0]-target[0], zy = eye[1]-target[1], zz = eye[2]-target[2];
  let len = 1 / Math.hypot(zx, zy, zz);
  const z0=zx*len, z1=zy*len, z2=zz*len;
  const x0 = up[1]*z2 - up[2]*z1, x1 = up[2]*z0 - up[0]*z2, x2 = up[0]*z1 - up[1]*z0;
  len = Math.hypot(x0,x1,x2); const rl = len ? 1/len : 0;
  const r0=x0*rl, r1=x1*rl, r2=x2*rl;
  const u0=z1*r2-z2*r1, u1=z2*r0-z0*r2, u2=z0*r1-z1*r0;
  return new Float32Array([
    r0, u0, z0, 0,
    r1, u1, z1, 0,
    r2, u2, z2, 0,
    -(r0*eye[0]+r1*eye[1]+r2*eye[2]),
    -(u0*eye[0]+u1*eye[1]+u2*eye[2]),
    -(z0*eye[0]+z1*eye[1]+z2*eye[2]),
    1,
  ]);
}

function mat4Mul(a, b) {
  const o = new Float32Array(16);
  for (let i = 0; i < 4; i++)
    for (let j = 0; j < 4; j++)
      o[j*4+i] = a[i]*b[j*4] + a[4+i]*b[j*4+1] + a[8+i]*b[j*4+2] + a[12+i]*b[j*4+3];
  return o;
}

// ============================================================
// FPS + Main loop + Benchmark reporting
// ============================================================
const frameTimes = [];
let lastTime = performance.now();
const hud = document.getElementById('hud');
let benchFrame = 0, benchDone = false;

function frame() {
  const now = performance.now();
  const dt = now - lastTime;
  lastTime = now;
  benchFrame++;
  if (benchFrame > 30) frameTimes.push(dt);
  if (frameTimes.length > 200) frameTimes.shift();

  const display = frameTimes.length ? frameTimes : [16.6];
  const avgMs = display.reduce((a,b) => a+b, 0) / display.length;
  hud.textContent = `${NUM_BOIDS.toLocaleString()} boids | ${(1000/avgMs).toFixed(0)} fps | ${avgMs.toFixed(1)} ms`;

  if (benchmarkBoids && frameTimes.length >= 120 && !benchDone) {
    benchDone = true;
    const sorted = [...frameTimes].sort((a,b) => a - b);
    const avg = sorted.reduce((a,b) => a+b, 0) / sorted.length;
    const p99 = sorted[Math.floor(sorted.length * 0.99)];
    fetch('/api/bench_result', { method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ num_boids: NUM_BOIDS, frames: sorted.length,
        avg_ms: +avg.toFixed(2), p99_ms: +p99.toFixed(2),
        min_ms: +sorted[0].toFixed(2), max_ms: +sorted[sorted.length-1].toFixed(2) }),
    }).catch(() => {});
    hud.textContent += ' | BENCHMARK COMPLETE';
  }



  const eye = [
    distance * Math.cos(elevation) * Math.sin(azimuth),
    distance * Math.sin(elevation),
    distance * Math.cos(elevation) * Math.cos(azimuth),
  ];
  const aspect = canvas.width / canvas.height;
  const proj = perspective(Math.PI / 3, aspect, 1.0, 600);
  const view = lookAt(eye, [0,0,0], [0,1,0]);
  const vp = mat4Mul(proj, view);

  const encoder = device.createCommandEncoder();
  const simSteps = Math.max(1, Math.round(currentParams.simSpeed ?? 1));
  for (let s = 0; s < simSteps; s++) {
    simulation.update(encoder, s === simSteps - 1); // stats only on last step
  }
  const ar = autoRangeCb.checked;
  renderer.render(encoder, vp, currentParams.gradientId ?? 0, currentParams.colorSource ?? 0,
    currentParams.gain ?? 0.5, ar, simulation.autoMin, simulation.autoMax);
  device.queue.submit([encoder.finish()]);
  // Async readback of auto-range stats (non-blocking)
  if (ar) simulation.readStats();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

function showError(msg) {
  document.getElementById('hud').remove();
  const d = document.createElement('div'); d.id = 'error'; d.textContent = msg;
  document.body.appendChild(d);
}
</script>
</body>
</html>
